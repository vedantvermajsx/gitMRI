# Server
server.port=8080

# Database - PostgreSQL (production)
# spring.datasource.url=jdbc:postgresql://localhost:5432/repointel
# spring.datasource.username=repointel
# spring.datasource.password=repointel
# spring.datasource.driver-class-name=org.postgresql.Driver

# Database - H2 (development default)
spring.datasource.url=jdbc:h2:mem:repointel;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Analysis settings
repointel.clone.base-dir=/tmp/repointel/repos
repointel.clone.timeout-minutes=10
repointel.analysis.max-concurrent=3

# CORS
repointel.cors.allowed-origins=http://localhost:3000,http://localhost:5173

